<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 | 드림전동차</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="/css/style.css?v=20260214-999">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        .error-page {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1.5rem;
            text-align: center;
        }
        .error-card {
            max-width: 480px;
            padding: 2.5rem 2rem;
            border-radius: 16px;
            background: var(--bg-card, #1a202c);
            border: 1px solid var(--glass-border, rgba(255,255,255,0.08));
        }
        .error-card h1 {
            font-size: 4rem;
            margin: 0 0 0.5rem;
            color: var(--primary, #10b981);
            font-weight: 700;
        }
        .error-card h2 {
            margin: 0 0 1rem;
            color: #f7fafc;
            font-size: 1.35rem;
        }
        .error-card p {
            color: #a0aec0;
            line-height: 1.7;
            margin: 0 0 1.5rem;
        }
        .error-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
        }
        .error-actions a {
            display: inline-block;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.95rem;
        }
        .error-actions .btn-home {
            background: var(--primary, #10b981);
            color: #fff;
        }
        .error-actions .btn-link {
            border: 1px solid rgba(255,255,255,0.2);
            color: #e2e8f0;
        }
    </style>
</head>
<body>
    <header class="gnb">
        <a href="/index.html" class="gnb-logo main-logo-link">
            <img src="/images/logo.png" alt="DREAM EV 드림전동차" class="logo-img">
        </a>
        <nav class="gnb-nav">
            <ul class="mobile-menu-list">
                <li><a href="/index.html">처음으로</a></li>
                <li><a href="/about.html">회사소개</a></li>
                <li><a href="/cases">제작사례</a></li>
                <li><a href="/repair-cases">수리사례</a></li>
                <li><a href="/support.html">고객센터</a></li>
                <li><a href="/contact.html">상담·견적 문의</a></li>
            </ul>
        </nav>
        <button class="mobile-menu-toggle" aria-label="메뉴 열기"><span></span><span></span><span></span></button>
        <a href="/contact.html" class="header-btn btn-primary">상담·견적 문의</a>
    </header>

    <main class="error-page">
        <div class="error-card">
            <h1>404</h1>
            <h2>요청하신 페이지를 찾을 수 없습니다</h2>
            <p>주소가 변경되었거나 아직 배포되지 않은 파일일 수 있습니다. 잠시 후 다시 시도하거나 아래 링크로 이동해 주세요.</p>
            <div class="error-actions">
                <a href="/index.html" class="btn-home">처음으로</a>
                <a href="/cases" class="btn-link">제작사례</a>
                <a href="/contact.html" class="btn-link">상담·견적 문의</a>
            </div>
        </div>
    </main>

    <script src="/js/script.js"></script>
</body>
</html>
