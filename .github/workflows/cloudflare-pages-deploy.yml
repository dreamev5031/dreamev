# 비상용: Git 자동배포가 동작하지 않을 때만 수동 실행하세요.
# CLOUDFLARE_DEPLOY_HOOK_URL secret이 설정되어 있어야 합니다.
name: Trigger Cloudflare Pages Deploy (emergency)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Deploy Hook
        env:
          HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "CLOUDFLARE_DEPLOY_HOOK_URL secret is not set."
            exit 1
          fi
          curl -fsS -X POST "$HOOK_URL"
          echo "Cloudflare Pages deploy hook triggered."
